<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink chat</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --tg-bg: #eceff1; --tg-sidebar-bg: #ffffff; --tg-primary: #1a237e;
            --tg-primary-hover: #12185c; --tg-text-muted: #707579; --tg-border: #dfe5ec;
            --tg-my-msg: #e8eaf6; --tg-other-msg: #ffffff; --tg-chat-bg: #f4f4f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { height: 100%; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }
        #auth-screen { justify-content: center; align-items: center; background: #517da2; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; }
        .auth-logo { width: 70px; height: 70px; background: var(--tg-primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; }
        .auth-card input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--tg-border); border-radius: 6px; }
        .auth-card button { width: 100%; padding: 10px; background: var(--tg-primary); border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .auth-card .btn-secondary { background: none; color: var(--tg-primary); border: 1px solid var(--tg-primary); }
        .alert-error { color: red; margin-bottom: 10px; display: none; }
        #app-screen { height: 100vh; }
        .sidebar { width: 300px; border-right: 1px solid var(--tg-border); display: flex; flex-direction: column; background: white; }
        .sidebar-header { display: flex; padding: 10px; gap: 10px; }
        .sidebar-header button { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--tg-text-muted); }
        .search-bar { background: #f1f5f9; display: flex; align-items: center; padding: 5px 10px; border-radius: 15px; flex: 1; }
        .search-bar input { background: none; border: none; outline: none; width: 100%; margin-left: 5px; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 10px; gap: 10px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .chat-item:hover { background: #f4f4f5; }
        .avatar { width: 40px; height: 40px; background: #a2bde6; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background-color: var(--tg-chat-bg); background-image: url('https://githubusercontent.com'); position: relative; }
        .chat-stub { position: absolute; width:100%; height:100%; background: #f4f4f5; display:none; align-items:center; justify-content:center; color: var(--tg-text-muted); }
        .chat-stub.active { display: flex; }
        .chat-active { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: white; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid var(--tg-border); }
        .chat-info { display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.my { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }
        .msg-bubble { max-width: 60%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-row.my .msg-bubble { background: var(--tg-my-msg); }
        .msg-row.other .msg-bubble { background: var(--tg-other-msg); }
        .msg-author { font-size: 11px; font-weight: bold; color: var(--tg-primary); }
        .msg-time { font-size: 10px; color: gray; text-align: right; display: block; margin-top: 3px; }
        .chat-input-panel { background: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .btn-file { font-size: 18px; color: var(--tg-text-muted); cursor: pointer; }
        .input-wrapper { flex: 1; }
        .input-wrapper input { width: 100%; padding: 8px; border: none; background: #f1f5f9; border-radius: 15px; outline: none; }
        #btn-send-message { background: none; border: none; color: var(--tg-primary); font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <div class="auth-logo"><i class="fa-paper-plane"></i></div>
            <h2>Войти в Ink chat</h2>
            <div class="alert-error" id="auth-error"></div>
            <input type="text" id="auth-username" placeholder="Никнейм">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button id="btn-login">ВОЙТИ</button>
            <button id="btn-register" class="btn-secondary">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="search-bar">
                    <i class="fa-search"></i>
                    <input type="text" id="search-friend-id" placeholder="10-значный ID...">
                </div>
                <button id="btn-action-add"><i class="fa-user-plus"></i></button>
            </div>
            <div class="chats-list" id="chats-container"></div>
        </aside>

        <main class="chat-window">
            <div id="chat-stub" class="chat-stub active"><p>Выберите, кому хотели бы написать</p></div>
            <div id="chat-active" class="chat-active">
                <header class="chat-header">
                    <div class="chat-info">
                        <div class="avatar" id="active-chat-avatar">?</div>
                        <div><h3 id="active-chat-name">Имя чата</h3></div>
                    </div>
                </header>
                <div class="chat-messages" id="messages-container"></div>
                <footer class="chat-input-panel">
                    <label class="btn-file">
                        <i class="fa-paperclip"></i>
                        <input type="file" id="file-input" style="display:none;">
                    </label>
                    <div class="input-wrapper"><input type="text" id="message-text-input" placeholder="Напишите сообщение..."></div>
                    <button id="btn-send-message"><i class="fa-paper-plane"></i></button>
                </footer>
            </div>
        </main>
    </div>

    <script src="https://socket.io"></script>
    <script>
        const socket = typeof io !== 'undefined' ? io() : null;
        let currentUser = null;
        let activeChatId = null;

        const getEl = (id) => document.getElementById(id);

        window.addEventListener('DOMContentLoaded', () => {
            if (getEl('btn-login')) {
                getEl('btn-login').addEventListener('click', async () => {
                    const username = getEl('auth-username').value.trim();
                    const password = getEl('auth-password').value;
                    if(!username || !password) return alert('Заполните все поля');
                    const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    const data = await res.json();
                    if (data.error) { getEl('auth-error').innerText = data.error; getEl('auth-error').style.display = 'block'; } 
                    else { loginSuccess(data); }
                });
            }

            if (getEl('btn-register')) {
                getEl('btn-register').addEventListener('click', async () => {
                    const username = getEl('auth-username').value.trim();
                    const password = getEl('auth-password').value;
                    if(!username || !password) return alert('Заполните все поля');
                    const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    const data = await res.json();
                    if (data.error) { getEl('auth-error').innerText = data.error; getEl('auth-error').style.display = 'block'; } 
                    else { loginSuccess(data); }
                });
            }

            function loginSuccess(user) {
                currentUser = user;
                getEl('auth-screen').classList.remove('active');
                getEl('app-screen').classList.add('active');
                alert(`Вы вошли!\nВаш уникальный ID: ${user.id}\n(Скопируйте его и отправьте друзьям для поиска)`);
                if (socket) socket.emit('user:join', user.id);
            }

            if (getEl('btn-action-add')) {
                getEl('btn-action-add').addEventListener('click', () => {
                    const query = getEl('search-friend-id').value.trim();
                    if (query.length === 10 && /^\d+$/.test(query)) {
                        if (socket) socket.emit('chat:create_private', { userId: currentUser.id, targetId: query });
                    } else {
                        alert('Введите корректный 10-значный числовой ID пользователя');
                    }
                    getEl('search-friend-id').value = '';
                });
            }

            if (getEl('btn-send-message')) { getEl('btn-send-message').addEventListener('click', sendMessage); }
            if (getEl('message-text-input')) { getEl('message-text-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); }); }

            function sendMessage() {
                const input = getEl('message-text-input');
                const text = input.value.trim();
                if (!text || !activeChatId) return;
                if (socket) socket.emit('message:send', { chatId: activeChatId, senderId: currentUser.id, senderName: currentUser.username, text });
                input.value = '';
            }

            if (socket) {
                socket.on('user:chats', (chats) => {
                    const container = getEl('chats-container');
                    if (!container) return;
                    container.innerHTML = '';
                    chats.forEach(chat => {
                        const item = document.createElement('div');
                        item.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                        item.innerHTML = `<div class="avatar">${chat.name.substring(0,2).toUpperCase()}</div><div style="flex:1;"><h4>${chat.name}</h4></div>`;
                        item.onclick = () => openChat(chat.id, chat.name);
                        container.appendChild(item);
                    });
                });

                socket.on('chat:new', () => socket.emit('user:join', currentUser.id));
                socket.on('chat:error', (err) => alert(err));

                socket.on('chat:opened', ({ chatId, messages }) => {
                    if (chatId !== activeChatId) return;
                    const container = getEl('messages-container');
                    if (!container) return;
                    container.innerHTML = '';
                    messages.forEach(msg => displayMessage(msg));
                    container.scrollTop = container.scrollHeight;
                });

                socket.on('message:new', (msg) => {
                    if (msg.chatId === activeChatId) { displayMessage(msg); const c = getEl('messages-container'); if (c) c.scrollTop = c.scrollHeight; }
                });
            }
        });

        function openChat(chatId, chatName) {
            activeChatId = chatId;
            getEl('chat-stub').classList.remove('active');
            getEl('chat-active').classList.add('active');
            getEl('active-chat-name').innerText = chatName;
            getEl('active-chat-avatar').innerText = chatName.substring(0,2).toUpperCase();
            if (socket) socket.emit('chat:create_private', { userId: currentUser.id, targetId: chatId });
        }

        function displayMessage(msg) {
            const isMy = msg.sender_id === currentUser.id;
            const row = document.createElement('div');
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            let content = isMy ? '' : `<div class="msg-author">${msg.sender_name}</div>`;
            if (msg.text) content += `<span>${msg.text}</span>`;
            content += `<span class="msg-time">${msg.timestamp}</span>`;
            row.innerHTML = `<div class="msg-bubble">${content}</div>`;
            getEl('messages-container').appendChild(row);
        }
    </script>
</body>
</html>
